<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenant Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#198754;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
}

h2{
    text-align:center;
}
</style>

<script>
function login(){
    let flat=document.getElementById("flat").value;

if(flat=="1"){
    window.location.href="dashboard.html";
}else if(flat=="2"){
    window.location.href="dashboard.html";
}else if(flat=="3"){
    window.location.href="dashboard.html";
}else if(flat=="4"){
    window.location.href="dashboard.html";
}else{
    alert("Invalid Flat Number");
}
}
</script>

</head>
<body>

<div class="box">
<h2>👤 Tenant Login</h2>

<input type="number" id="flat" placeholder="Enter Flat Number (1-4)">

<button onclick="login()">Login</button>

</div>

</body>
</html>
